# Theme (hostname shows via the theme's built-in #h segment; widget adds the
# machine's IP on Linux, empty on macOS where hostname -I doesn't exist)
set -g @onedark_widgets "#(hostname -I | awk '{print $1}')"
set -g @onedark_time_format "%I:%M"
set -g @onedark_date_format "%m:%d"
run-shell ~/.config/tmux/tmux-onedark-theme/tmux-onedark-theme.tmux

# Terminal
set -g default-terminal "xterm-256color"
set-option -g status-position bottom

# Fix neovim esc delay
set -s escape-time 0

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_selection_mouse 'clipboard'
set -g set-clipboard on

# Session save/restore
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-save 'C-s'
set -g @resurrect-restore 'C-r'

# Prefix: Ctrl-f
unbind C-b
set -g prefix C-f

# Vi mode
setw -g mode-keys vi

# Windows start at 1
set -g base-index 1

# Mouse
set-option -g mouse on

# Alt arrow to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift arrow to switch windows
bind -n S-Left previous-window
bind -n S-Right next-window

# Split / new-window keeping current path
bind-key h split-window -h -c "#{pane_current_path}"
bind-key v split-window -v -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"

# Easy config reload
bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded."

# Initialize tpm (keep at bottom)
run-shell ~/.config/tmux/plugins/tpm/tpm

# Force-load plugins in case TPM didn't source them
run-shell ~/.config/tmux/plugins/tmux-resurrect/resurrect.tmux
run-shell ~/.config/tmux/plugins/tmux-continuum/continuum.tmux
run-shell ~/.config/tmux/plugins/tmux-yank/yank.tmux
